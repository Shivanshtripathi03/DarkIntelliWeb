crawler:
  proxy: socks5://localhost:9050
  crawl_interval_minutes: 360
  max_depth: 2
  timeout_seconds: 60
  circuit_rotation_interval: 10
  js_content_threshold: 200

scoring:
  high_risk_threshold: 70
  weights:
    ai_confidence: 0.4
    category_severity: 0.4
    indicator_criticality: 0.2

apis:
  abuseipdb: ""
  virustotal: ""
  ipinfo: ""

triage:
  enabled: false
  cache_ttl_hours: 24

categories_severity:
  "data breaches": 90
  "ransomware activity": 95
  "malware marketplaces": 85
  "exploit trading": 85
  "credential dumps": 90
  "botnet services": 80
  "hacking services": 75
  "carding marketplaces": 80
  "stolen databases": 90
